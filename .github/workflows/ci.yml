name: NOA CI

on:
  push:
    branches: [master]
    paths: ['noa-vscode/**']
  pull_request:
    branches: [master]
    paths: ['noa-vscode/**']

defaults:
  run:
    working-directory: noa-vscode

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: noa-vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck (tsc --noEmit)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (vitest)
        run: npm run test -- --reporter=verbose

      - name: Build (esbuild bundle)
        run: npm run build

      - name: Package smoke test
        run: |
          test -f out/extension.js && echo "Bundle exists" || exit 1
          echo "Bundle size: $(wc -c < out/extension.js) bytes"
